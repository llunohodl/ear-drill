<!doctype html>
<html lang="ru">
    <head>
        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>Ear Drill</title>

        <script
            type="text/javascript"
            src="./vendor/alphatab/dist/alphaTab.min.js"
        ></script>
        <script
            type="text/javascript"
            src="./vendor/tone/build/Tone.js"
        ></script>
        <script
            type="text/javascript"
            src="./vendor/Tonejs-Instruments.js"
        ></script>

        <script type="text/javascript" src="./script/engine.js"></script>
        <link rel="stylesheet" href="./vendor/pico/css/pico.min.css" />
        <link rel="stylesheet" href="./style/slider.css" />
        <link rel="manifest" href="manifest.json" />
    </head>
    <body>
        <section class="loop-controls" aria-label="Generation controls">
            <button type="button" class="primary" onclick="generateMelody()">
                Generate
            </button>
        </section>
        <section class="loop-controls" aria-label="Playback controls">
            <button type="button" class="primary" onclick="playMelody()">
                Play all
            </button>
            <button type="button" class="primary" onclick="playLoop()">
                Play loop
            </button>
            <!-- Tempo -->
            <div class="control-group">
                <label for="tempo-slider"
                    >Tempo:
                    <output id="tempo-display" for="tempo-slider"
                        >80 BPM</output
                    ></label
                >
                <input
                    type="range"
                    id="tempo-slider"
                    min="40"
                    max="140"
                    step="5"
                    value="80"
                />
            </div>
            <!-- Loop Range -->
            <div class="control-group">
                <label
                    >Loop Range:
                    <output id="loop-display">Notes 1–16</output></label
                >
                <div class="dual-slider-track">
                    <input
                        type="range"
                        id="loop-start"
                        min="0"
                        max="15"
                        step="1"
                        value="0"
                        aria-label="Loop start note"
                    />
                    <input
                        type="range"
                        id="loop-end"
                        min="0"
                        max="15"
                        step="1"
                        value="15"
                        aria-label="Loop end note"
                    />
                    <div class="slider-highlight" id="slider-highlight"></div>
                </div>
            </div>
            <script type="text/javascript" src="./script/slider.js"></script>
        </section>
        <section class="loop-controls" aria-label="Key conrols">
            <!-- Key -->
            <button type="button" class="primary" onclick="renderTabs()">
                Show Notes
            </button>
            <div id="tab-container"></div>
        </section>
    </body>
</html>
